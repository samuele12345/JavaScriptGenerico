<!DOCTYPE HTML>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ClassList</title>
        <link href="styles.css" rel="stylesheet">
        <script src="script.js" defer></script>
    </head>

    <body>
        <!-- Titolo che cambia testo/colore in base allo stato del bottone -->

        <!-- Bottone con classe colore iniziale (blue) -->
        <button class="but blue">Click!</button>
    </body>
